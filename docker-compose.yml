# A2M2 — Docker Compose
# Tüm servisleri tek komutla ayağa kaldır: docker-compose up --build

version: '3.8'

services:
  # ───────────── Backend API ─────────────
  backend:
    build: ./backend
    container_name: a2m2-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/a2m2
      - JWT_SECRET=a2m2_super_secret_jwt_key_2026
      - REDIS_URL=redis://redis:6379
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - AI_SERVICE_URL=http://ai-service:5001
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      - a2m2-network
    restart: unless-stopped

  # ───────────── AI Service ─────────────
  ai-service:
    build: ./ai-service
    container_name: a2m2-ai-service
    ports:
      - "5001:5001"
    environment:
      - PORT=5001
      - RABBITMQ_URL=amqp://rabbitmq:5672
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - a2m2-network
    restart: unless-stopped

  # ───────────── MongoDB ─────────────
  mongodb:
    image: mongo:7
    container_name: a2m2-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - a2m2-network
    restart: unless-stopped

  # ───────────── Redis ─────────────
  redis:
    image: redis:7-alpine
    container_name: a2m2-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - a2m2-network
    restart: unless-stopped

  # ───────────── RabbitMQ ─────────────
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: a2m2-rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin123
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - a2m2-network
    restart: unless-stopped

# ───────────── Volumes ─────────────
volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  rabbitmq_data:
    driver: local

# ───────────── Network ─────────────
networks:
  a2m2-network:
    driver: bridge
