name: A2M2 CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.11'

jobs:
  # ───────── Backend Lint & Test ─────────
  backend-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Node.js kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Bağımlılıkları yükle
        run: npm ci
        working-directory: backend

      - name: Lint kontrolü
        run: npm run lint --if-present
        working-directory: backend

      - name: Testleri çalıştır
        run: npm test --if-present
        working-directory: backend
        env:
          MONGO_URI: mongodb://localhost:27017/a2m2_test
          JWT_SECRET: test_jwt_secret
          REDIS_URL: redis://localhost:6379

  # ───────── AI Service Test ─────────
  ai-test:
    name: AI Service Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Python kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: ai-service/requirements.txt

      - name: Bağımlılıkları yükle
        run: pip install -r requirements.txt
        working-directory: ai-service

      - name: Testleri çalıştır
        run: python -m pytest tests/ -v
        working-directory: ai-service

  # ───────── Docker Build ─────────
  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: [backend-test, ai-test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - uses: actions/checkout@v4

      - name: Docker Compose Build
        run: docker compose build

      - name: Docker Compose servislerini kontrol et
        run: |
          docker compose up -d
          sleep 15
          # Sağlık kontrolü
          curl -f http://localhost:5000/api/health || exit 1
          docker compose down
