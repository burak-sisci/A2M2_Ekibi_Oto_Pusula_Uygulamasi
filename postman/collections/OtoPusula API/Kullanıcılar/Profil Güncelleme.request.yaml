$kind: http-request
description: >
  Kullanıcının şifre, telefon veya isim gibi kişisel bilgilerini değiştirir.
  Sadece kendi profilini güncelleyebilir.
url: "{{baseUrl}}/users/:userId"
method: PUT
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: userId
    value: 64a1b2c3d4e5f6789abc1234
    description: Kullanıcının benzersiz kimlik numarası
body:
  type: json
  content: |-
    {
      "name": "Burak S.",
      "phone": "+905559876543",
      "password": "YeniSifre5678!"
    }
examples: ./.resources/Profil Güncelleme.resources/examples
order: 2000
