$kind: http-example
request:
  url: "{{baseUrl}}/users/:userId"
  method: PUT
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: userId
      value: 64a1b2c3d4e5f6789abc1234
      description: Kullanıcının benzersiz kimlik numarası
  body:
    type: json
    content: |-
      {
        "name": "Burak S.",
        "phone": "+905559876543",
        "password": "YeniSifre5678!"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "İlan bulunamadı",
        "code": "CAR_NOT_FOUND"
      }
order: 3000
