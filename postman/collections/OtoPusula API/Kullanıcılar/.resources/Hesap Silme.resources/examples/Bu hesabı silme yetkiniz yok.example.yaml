$kind: http-example
request:
  url: "{{baseUrl}}/users/:userId"
  method: DELETE
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: userId
      value: 64a1b2c3d4e5f6789abc1234
      description: Kullanıcının benzersiz kimlik numarası
  body:
    type: text
    content: ""
response:
  statusCode: 403
  statusText: Forbidden
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "İlan bulunamadı",
        "code": "CAR_NOT_FOUND"
      }
order: 3000
