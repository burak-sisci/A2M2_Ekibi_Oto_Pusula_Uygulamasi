$kind: http-request
description: >
  Bir kullanıcının platformdaki farklı ilanlara yaptığı tüm geçmiş yorumları tek
  bir liste halinde gösterir.
url: "{{baseUrl}}/users/:userId/comments?page=1&limit=10"
method: GET
headers:
  Accept: application/json
queryParams:
  - key: page
    value: "1"
    description: Sayfa numarası (varsayılan 1)
  - key: limit
    value: "10"
    description: Sayfa başına sonuç sayısı (varsayılan 10, maksimum 50)
pathVariables:
  - key: userId
    value: 64a1b2c3d4e5f6789abc1234
    description: Kullanıcının benzersiz kimlik numarası
body:
  type: text
  content: ""
examples: ./.resources/Kullanıcının Kendi Yorumlarını Listeleme.resources/examples
order: 5000
