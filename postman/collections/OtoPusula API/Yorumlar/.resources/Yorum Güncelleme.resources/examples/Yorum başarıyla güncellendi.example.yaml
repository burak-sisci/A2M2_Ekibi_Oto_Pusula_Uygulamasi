$kind: http-example
request:
  url: "{{baseUrl}}/comments/:commentId"
  method: PUT
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: commentId
      value: 64d4e5f6789abcdef234567
      description: Yorumun benzersiz kimlik numarası
  body:
    type: json
    content: |-
      {
        "content": "Bu araç hâlâ satılık mı? Kaç yıldır kullanıyorsunuz?"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "_id": "64d4e5f6789abcdef234567",
        "userId": "64a1b2c3d4e5f6789abc1234",
        "carId": "64b2c3d4e5f6789abc56789",
        "createdAt": "2026-03-06T12:30:00Z",
        "text": "Bu araç hâlâ satılık mı? Kaç yıldır kullanıyorsunuz?"
      }
order: 1000
