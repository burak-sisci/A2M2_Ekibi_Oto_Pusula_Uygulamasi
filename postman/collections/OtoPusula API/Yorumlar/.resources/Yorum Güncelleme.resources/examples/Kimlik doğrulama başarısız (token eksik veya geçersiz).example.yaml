$kind: http-example
request:
  url: "{{baseUrl}}/comments/:commentId"
  method: PUT
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: commentId
      value: 64d4e5f6789abcdef234567
      description: Yorumun benzersiz kimlik numarası
  body:
    type: json
    content: |-
      {
        "content": "Bu araç hâlâ satılık mı? Kaç yıldır kullanıyorsunuz?"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "İlan bulunamadı",
        "code": "CAR_NOT_FOUND"
      }
order: 3000
