$kind: http-example
request:
  url: "{{baseUrl}}/cars/:carId/share"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: carId
      value: 64b2c3d4e5f6789abc56789
      description: Araç ilanının benzersiz kimlik numarası
  body:
    type: text
    content: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "shortUrl": "https://otopusula.app/s/aBc123",
        "originalUrl": "https://otopusula.app/cars/64b2c3d4e5f6789abc56789",
        "expiresAt": "2026-06-07T14:00:00Z"
      }
order: 1000
