$kind: http-example
request:
  url: "{{baseUrl}}/cars/:carId/comments"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: carId
      value: 64b2c3d4e5f6789abc56789
      description: Araç ilanının benzersiz kimlik numarası
  body:
    type: json
    content: |-
      {
        "content": "Bu araç hâlâ satılık mı? Kaç yıldır kullanıyorsunuz?"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "İlan bulunamadı",
        "code": "CAR_NOT_FOUND"
      }
order: 3000
