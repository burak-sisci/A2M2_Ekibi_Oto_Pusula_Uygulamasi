$kind: http-example
request:
  url: "{{baseUrl}}/cars/:carId/comments?page=1&limit=10"
  method: GET
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  queryParams:
    - key: page
      value: "1"
      description: Sayfa numarası (varsayılan 1)
    - key: limit
      value: "10"
      description: Sayfa başına sonuç sayısı (varsayılan 10, maksimum 50)
  pathVariables:
    - key: carId
      value: 64b2c3d4e5f6789abc56789
      description: Araç ilanının benzersiz kimlik numarası
  body:
    type: text
    content: ""
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "İlan bulunamadı",
        "code": "CAR_NOT_FOUND"
      }
order: 2000
