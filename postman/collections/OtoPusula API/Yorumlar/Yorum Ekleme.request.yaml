$kind: http-request
description: >
  Kullanıcıların ilan altına soru sormak veya görüş belirtmek için metin tabanlı
  yorum yapmasını sağlar.
url: "{{baseUrl}}/cars/:carId/comments"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
pathVariables:
  - key: carId
    value: 64b2c3d4e5f6789abc56789
    description: Araç ilanının benzersiz kimlik numarası
body:
  type: json
  content: |-
    {
      "content": "Bu araç hâlâ satılık mı? Kaç yıldır kullanıyorsunuz?"
    }
examples: ./.resources/Yorum Ekleme.resources/examples
order: 2000
