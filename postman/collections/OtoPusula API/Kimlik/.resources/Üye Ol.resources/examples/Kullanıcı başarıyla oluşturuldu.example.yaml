$kind: http-example
request:
  url: "{{baseUrl}}/auth/register"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "name": "Burak Şişci",
        "email": "burak@example.com",
        "phone": "+905551234567",
        "password": "Gizli1234!",
        "gender": "Erkek",
        "birthDate": "1998-05-15"
      }
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "_id": "64a1b2c3d4e5f6789abc1234",
        "name": "Burak Şişci",
        "email": "burak@example.com",
        "phone": "+905551234567",
        "createdAt": "2025-01-10T09:00:00Z",
        "gender": "Erkek",
        "birthDate": "1998-05-15",
        "updatedAt": "2026-03-07T14:30:00Z"
      }
order: 1000
