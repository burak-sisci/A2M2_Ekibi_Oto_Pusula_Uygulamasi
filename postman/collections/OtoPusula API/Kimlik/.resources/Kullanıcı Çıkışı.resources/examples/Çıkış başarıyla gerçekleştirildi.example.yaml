$kind: http-example
request:
  url: "{{baseUrl}}/auth/logout"
  method: POST
  headers:
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: text
    content: ""
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "Oturum başarıyla sonlandırıldı"
      }
order: 1000
