$kind: http-example
request:
  url: "{{baseUrl}}/cars"
  method: POST
  headers:
    - key: Content-Type
      value: multipart/form-data
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: formdata
    content:
      - type: text
        key: brand
        value: Toyota
        description: Araç markası
      - type: text
        key: model
        value: Corolla
        description: Araç modeli
      - type: text
        key: year
        value: "2020"
        description: Model yılı
      - type: text
        key: km
        value: "45000"
        description: Araç kilometresi
      - type: text
        key: fuelType
        value: Benzin
        description: Yakıt türü
      - type: text
        key: gearType
        value: Otomatik
        description: Vites türü
      - type: text
        key: price
        value: "850000"
        description: Satış fiyatı (TL)
      - type: text
        key: location
        value: "[object Object]"
        description: Aracın bulunduğu konum
      - type: text
        key: description
        value: Kazasız, hasarsız, galeriden alınma araç. Tüm bakımları yaptırılmıştır.
        description: İlan açıklama metni
      - type: text
        key: damageInfo
        value: Kaput Değişen,Sağ Çamurluk Boyalı
        description: Hasar bilgileri (boya, değişen parçalar vb.)
      - type: text
        key: images
        value: string,string
        description: Araç fotoğrafları (dosya yükleme — multipart/form-data)
response:
  statusCode: 201
  statusText: Created
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "_id": "64b2c3d4e5f6789abc56789",
        "userId": "64a1b2c3d4e5f6789abc1234",
        "brand": "Toyota",
        "model": "Corolla",
        "year": 2020,
        "km": 45000,
        "fuelType": "Benzin",
        "gearType": "Otomatik",
        "price": 850000,
        "location": {
          "city": "İstanbul",
          "district": "Kadıköy"
        },
        "createdAt": "2026-02-15T10:00:00Z",
        "description": "Kazasız, hasarsız, galeriden alınma araç.",
        "images": [
          "https://storage.example.com/cars/img1.jpg",
          "https://storage.example.com/cars/img2.jpg"
        ],
        "damageInfo": [
          "Kaput Değişen",
          "Sağ Çamurluk Boyalı"
        ],
        "updatedAt": "2026-03-01T16:45:00Z"
      }
order: 1000
