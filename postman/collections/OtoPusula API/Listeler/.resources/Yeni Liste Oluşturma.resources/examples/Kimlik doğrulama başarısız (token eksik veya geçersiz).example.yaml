$kind: http-example
request:
  url: "{{baseUrl}}/lists"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "name": "Alınacaklar"
      }
response:
  statusCode: 401
  statusText: Unauthorized
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "İlan bulunamadı",
        "code": "CAR_NOT_FOUND"
      }
order: 3000
