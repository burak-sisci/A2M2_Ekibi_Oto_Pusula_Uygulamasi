$kind: http-example
request:
  url: "{{baseUrl}}/lists/:listId/cars"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: listId
      value: 64c3d4e5f6789abcdef1234
      description: Listenin benzersiz kimlik numarası
  body:
    type: json
    content: |-
      {
        "carId": "64b2c3d4e5f6789abc56789"
      }
response:
  statusCode: 200
  statusText: OK
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "_id": "64c3d4e5f6789abcdef1234",
        "userId": "64a1b2c3d4e5f6789abc1234",
        "name": "Alınacaklar",
        "isDefault": false,
        "carCount": 5,
        "createdAt": "2026-01-20T08:00:00Z",
        "updatedAt": "2026-03-05T11:00:00Z"
      }
order: 1000
