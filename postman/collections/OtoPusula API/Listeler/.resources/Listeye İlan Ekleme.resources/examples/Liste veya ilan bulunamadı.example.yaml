$kind: http-example
request:
  url: "{{baseUrl}}/lists/:listId/cars"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  pathVariables:
    - key: listId
      value: 64c3d4e5f6789abcdef1234
      description: Listenin benzersiz kimlik numarası
  body:
    type: json
    content: |-
      {
        "carId": "64b2c3d4e5f6789abc56789"
      }
response:
  statusCode: 404
  statusText: Not Found
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "İlan bulunamadı",
        "code": "CAR_NOT_FOUND"
      }
order: 5000
