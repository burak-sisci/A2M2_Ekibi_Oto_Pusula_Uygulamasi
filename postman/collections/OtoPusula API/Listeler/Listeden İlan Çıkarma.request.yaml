$kind: http-request
description: >
  Önceden listeye eklenmiş bir aracın sadece o listeden çıkarılmasını sağlar.
  İlanın kendisi silinmez.
url: "{{baseUrl}}/lists/:listId/cars/:carId"
method: DELETE
headers:
  Accept: application/json
pathVariables:
  - key: listId
    value: 64c3d4e5f6789abcdef1234
    description: Listenin benzersiz kimlik numarası
  - key: carId
    value: 64b2c3d4e5f6789abc56789
    description: Araç ilanının benzersiz kimlik numarası
body:
  type: text
  content: ""
examples: ./.resources/Listeden İlan Çıkarma.resources/examples
order: 6000
