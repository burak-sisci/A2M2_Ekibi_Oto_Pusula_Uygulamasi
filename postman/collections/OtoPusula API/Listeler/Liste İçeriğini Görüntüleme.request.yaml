$kind: http-request
description: >
  Spesifik bir listenin içine girildiğinde, o listedeki tüm araç ilanlarının
  detaylarıyla birlikte ekrana getirilmesini sağlar.
url: "{{baseUrl}}/lists/:listId"
method: GET
headers:
  Accept: application/json
pathVariables:
  - key: listId
    value: 64c3d4e5f6789abcdef1234
    description: Listenin benzersiz kimlik numarası
body:
  type: text
  content: ""
examples: ./.resources/Liste İçeriğini Görüntüleme.resources/examples
order: 2000
