$kind: http-example
request:
  url: "{{baseUrl}}/cars/predict-price"
  method: POST
  headers:
    - key: Content-Type
      value: application/json
    - key: Accept
      value: application/json
    - key: Authorization
      value: <API Key>
      description: "Added as a part of security scheme: apikey"
  body:
    type: json
    content: |-
      {
        "brand": "Toyota",
        "model": "Corolla",
        "year": 2020,
        "km": 45000,
        "fuelType": "Benzin",
        "gearType": "Otomatik"
      }
response:
  statusCode: 503
  statusText: Service Unavailable
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "message": "İlan bulunamadı",
        "code": "CAR_NOT_FOUND"
      }
order: 4000
