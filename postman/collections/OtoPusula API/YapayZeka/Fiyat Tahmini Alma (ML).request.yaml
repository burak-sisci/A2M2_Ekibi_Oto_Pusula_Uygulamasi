$kind: http-request
description: >
  Kullanıcının gönderdiği araç özelliklerinin makine öğrenmesi modeline
  sokularak, tahmini piyasa değerinin hesaplanıp geri döndürülmesini sağlar.
url: "{{baseUrl}}/cars/predict-price"
method: POST
headers:
  Content-Type: application/json
  Accept: application/json
body:
  type: json
  content: |-
    {
      "brand": "Toyota",
      "model": "Corolla",
      "year": 2020,
      "km": 45000,
      "fuelType": "Benzin",
      "gearType": "Otomatik"
    }
examples: ./.resources/Fiyat Tahmini Alma (ML).resources/examples
order: 1000
